<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ONE FM ENGIE – Action Tracking Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── CBRE Brand Colors ─────────────────────────────────────────────── */
:root{
  --cbre-green:#003F2D;
  --cbre-dark-green:#012A2D;
  --cbre-accent:#17E88F;
  --cbre-midnight:#032842;
  --cbre-midnight-tint:#778F9C;
  --cbre-sage:#538184;
  --cbre-celadon:#80BBAD;
  --cbre-wheat:#DBD99A;
  --cbre-dark-grey:#435254;
  --cbre-light-grey:#CAD1D3;
  --cbre-cement:#7F8480;
  --cbre-data-blue:#3E7CA6;
  --cbre-data-orange:#D2785A;
  --cbre-neg-red:#AD2A2A;
  --bg:#011a12;
  --bg2:#012a1e;
  --bg3:#013d2c;
  --border:rgba(0,179,134,.15);
  --border2:rgba(23,232,143,.2);
  --text:#e8f5f0;
  --muted:#96B3B6;
  --card:#012a1e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}
 
/* ── Header ────────────────────────────────────────────────────────── */
header{
  background:var(--cbre-green);
  border-bottom:3px solid var(--cbre-accent);
  padding:0 32px;
  display:flex;align-items:stretch;gap:0;flex-wrap:wrap;
  position:sticky;top:0;z-index:50;
}
.header-brand{display:flex;flex-direction:column;justify-content:center;padding:14px 0;border-right:1px solid rgba(255,255,255,.15);padding-right:28px;margin-right:28px}
.logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:1.5px;font-family:Georgia,serif}
.logo-sub{font-size:10px;color:var(--cbre-accent);letter-spacing:3px;text-transform:uppercase;margin-top:2px;font-weight:600}
.header-meta{display:flex;flex-direction:column;justify-content:center;font-size:11px;color:rgba(255,255,255,.6);line-height:1.6}
.header-meta strong{color:rgba(255,255,255,.9);font-size:12px}
.hright{display:flex;align-items:center;gap:12px;margin-left:auto;padding:14px 0}
.sync-badge{font-size:11px;padding:3px 10px;border-radius:2px;border:1px solid;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.sync-badge.ok{color:var(--cbre-accent);border-color:var(--cbre-accent);background:rgba(23,232,143,.08)}
.sync-badge.warn{color:var(--cbre-wheat);border-color:var(--cbre-wheat);background:rgba(219,217,154,.08)}
.sync-badge.err{color:#ff9090;border-color:#ff9090}
nav{display:flex;gap:0;height:100%}
.btn-sync{
  background:transparent;border:1px solid rgba(23,232,143,.4);color:var(--cbre-accent);
  padding:5px 14px;border-radius:2px;font-size:12px;font-weight:700;cursor:pointer;
  letter-spacing:.3px;transition:all .2s;white-space:nowrap;
}
.btn-sync:hover{background:rgba(23,232,143,.1);border-color:var(--cbre-accent)}
.btn-sync:disabled{opacity:.45;cursor:not-allowed}
.tab-btn{
  background:transparent;border:none;border-bottom:3px solid transparent;
  color:rgba(255,255,255,.6);padding:0 20px;
  cursor:pointer;font-size:13px;font-weight:600;letter-spacing:.3px;
  transition:all .2s;white-space:nowrap;margin-bottom:-3px;
}
.tab-btn.active{color:#fff;border-bottom-color:var(--cbre-accent)}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.9);background:rgba(255,255,255,.06)}
 
/* ── Views ─────────────────────────────────────────────────────────── */
.view{display:none;padding:28px 32px}.view.active{display:block}
 
/* ── Hero strip (dashboard) ─────────────────────────────────────────── */
.dash-hero{
  background:linear-gradient(135deg,var(--cbre-green) 0%,var(--cbre-dark-green) 100%);
  border-radius:4px;padding:28px 32px;margin-bottom:24px;
  display:flex;align-items:center;gap:40px;flex-wrap:wrap;
  position:relative;overflow:hidden;
  border-left:4px solid var(--cbre-accent);
}
.dash-hero::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(23,232,143,.06)}
.hero-text h1{font-size:22px;font-weight:800;color:#fff;font-family:Georgia,serif;margin-bottom:4px}
.hero-text p{font-size:13px;color:rgba(255,255,255,.65);line-height:1.5;max-width:460px}
.hero-tag{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--cbre-accent);text-transform:uppercase;margin-bottom:6px}
.hero-kpis{display:flex;gap:32px;flex-wrap:wrap;margin-left:auto}
.hero-stat{text-align:center}
.hero-stat .hbig{font-size:38px;font-weight:800;color:var(--cbre-accent);line-height:1;font-family:Georgia,serif}
.hero-stat .hunit{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
 
/* ── KPI Grid ───────────────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:24px}
.kpi{
  background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:18px 16px;position:relative;overflow:hidden;
}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--kpi-color,var(--cbre-accent))}
.kpi .num{font-size:30px;font-weight:800;color:var(--kpi-color,var(--cbre-accent));line-height:1;margin-bottom:4px;font-family:Georgia,serif}
.kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.kpi .sub{font-size:10px;color:var(--cbre-accent);margin-top:3px;font-weight:600}
 
/* ── Section header ─────────────────────────────────────────────────── */
.section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.section-hdr h2{font-size:13px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px}
.section-line{flex:1;height:1px;background:var(--border)}
 
/* ── Charts ─────────────────────────────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:20px}
.chart-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.chart-wrap{position:relative;height:200px}
 
/* ── Overdue banner ─────────────────────────────────────────────────── */
.overdue-banner{
  background:rgba(173,42,42,.12);border:1px solid rgba(173,42,42,.4);border-left:4px solid #AD2A2A;
  border-radius:4px;padding:14px 20px;margin-bottom:24px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.overdue-icon{font-size:22px;flex-shrink:0}
.overdue-text strong{font-size:14px;color:#ff9090;font-weight:700}
.overdue-text p{font-size:12px;color:rgba(255,144,144,.7);margin-top:2px}
.overdue-pills{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.overdue-pill{background:rgba(173,42,42,.2);border:1px solid rgba(173,42,42,.4);color:#ff9090;font-size:11px;font-weight:600;padding:3px 10px;border-radius:2px;white-space:nowrap}
 
/* ── Table ───────────────────────────────────────────────────────────── */
.table-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.table-toolbar input,.table-toolbar select{
  background:#011a12;border:1px solid var(--border2);color:var(--text);
  padding:8px 12px;border-radius:2px;font-size:13px;outline:none;
}
.table-toolbar input{flex:1;min-width:160px}
.table-toolbar input::placeholder{color:var(--muted)}
.table-toolbar select option{background:#012a1e}
.btn-add{
  background:var(--cbre-green);color:var(--cbre-accent);border:1px solid var(--cbre-accent);
  padding:8px 18px;border-radius:2px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
  letter-spacing:.3px;transition:all .2s;
}
.btn-add:hover{background:var(--cbre-accent);color:var(--cbre-green)}
.tbl-wrap{overflow-x:auto;border-radius:4px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{
  background:var(--cbre-green);color:rgba(255,255,255,.7);
  text-transform:uppercase;letter-spacing:.5px;font-size:10px;font-weight:700;
  padding:11px 12px;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:1;
  border-bottom:2px solid var(--cbre-accent);
}
td{padding:10px 12px;border-top:1px solid var(--border);vertical-align:top;color:var(--text);word-wrap:break-word}
tr:hover td{background:rgba(23,232,143,.04)}
.tr-overdue td{background:rgba(173,42,42,.06)}
.tr-overdue:hover td{background:rgba(173,42,42,.1)}
 
/* ── Badges ──────────────────────────────────────────────────────────── */
.badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:.3px}
.b-closed{background:rgba(0,63,45,.6);color:var(--cbre-accent);border:1px solid rgba(23,232,143,.3)}
.b-inprog{background:rgba(62,124,166,.2);color:#7ab8f5;border:1px solid rgba(62,124,166,.4)}
.b-notstart{background:rgba(219,217,154,.1);color:var(--cbre-wheat);border:1px solid rgba(219,217,154,.3)}
.b-block{background:rgba(173,42,42,.2);color:#ff9090;border:1px solid rgba(173,42,42,.4)}
.b-overdue{background:rgba(173,42,42,.15);color:#ffaaaa;border:1px solid rgba(173,42,42,.3);font-size:10px;padding:1px 6px}
.b-p1{background:rgba(173,42,42,.2);color:#ff9090;border:1px solid rgba(173,42,42,.4)}
.b-p2{background:rgba(219,217,154,.1);color:var(--cbre-wheat);border:1px solid rgba(219,217,154,.3)}
.b-p3{background:rgba(128,187,173,.1);color:var(--cbre-celadon);border:1px solid rgba(128,187,173,.3)}
.btn-edit{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:2px;cursor:pointer;font-size:11px;font-weight:600}
.btn-edit:hover{background:var(--cbre-accent);color:var(--cbre-green);border-color:var(--cbre-accent)}
 
/* ── Modal ───────────────────────────────────────────────────────────── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#012a1e;border:1px solid var(--border2);border-top:3px solid var(--cbre-accent);border-radius:4px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto}
.modal-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#012a1e;z-index:2}
.modal-header h2{font-size:16px;font-weight:800;color:#fff;font-family:Georgia,serif}
.modal-close{background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--cbre-accent)}
.modal-body{padding:20px 24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.form-group input,.form-group select,.form-group textarea{
  width:100%;background:#011a12;border:1px solid var(--border2);color:var(--text);
  padding:9px 12px;border-radius:2px;font-size:13px;outline:none;font-family:inherit;
}
.form-group input[type=date]{color-scheme:dark}
.form-group textarea{resize:vertical;min-height:72px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--cbre-accent)}
.form-group select option{background:#012a1e}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prev-comments{background:#011a12;border:1px solid var(--border);border-radius:2px;padding:10px 12px;max-height:150px;overflow-y:auto;font-size:12px;color:var(--muted);margin-bottom:8px}
.comment-entry{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.comment-entry:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.comment-meta{font-size:10px;color:var(--cbre-sage);margin-bottom:3px;font-weight:700}
.ro-field{background:#011a12;border:1px solid var(--border);border-radius:2px;padding:9px 12px;font-size:13px;color:var(--muted)}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;align-items:center;position:sticky;bottom:0;background:#012a1e}
.btn-save{background:var(--cbre-accent);color:var(--cbre-green);border:none;padding:9px 24px;border-radius:2px;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.3px}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:9px 18px;border-radius:2px;font-size:13px;cursor:pointer}
.btn-save:hover{background:#45EDA5}.btn-cancel:hover{color:#fff;border-color:#fff}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.sec{font-size:10px;font-weight:700;color:var(--cbre-accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);margin-top:4px}
 
/* ── Toast ───────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:2px;font-size:13px;font-weight:700;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;max-width:340px;border-left:3px solid}
.toast.ok{background:#012a1e;color:var(--cbre-accent);border-color:var(--cbre-accent)}
.toast.err{background:#1a0606;color:#ff9090;border-color:#AD2A2A}
.toast.warn{background:#1a1600;color:var(--cbre-wheat);border-color:var(--cbre-wheat)}
.toast.show{transform:translateY(0);opacity:1}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(23,232,143,.3);border-top-color:var(--cbre-accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.big-spin{width:28px;height:28px;border:3px solid rgba(23,232,143,.15);border-top-color:var(--cbre-accent);border-radius:50%;animation:spin .7s linear infinite}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px;color:var(--muted)}
 
/* ── About ───────────────────────────────────────────────────────────── */
.about-wrap{max-width:900px;margin:0 auto}
.about-hero{
  background:linear-gradient(135deg,var(--cbre-green) 0%,var(--cbre-dark-green) 100%);
  border-radius:4px;padding:48px 40px;margin-bottom:32px;
  border-left:4px solid var(--cbre-accent);position:relative;overflow:hidden;
}
.about-hero::before{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:rgba(23,232,143,.05)}
.about-hero::after{content:'';position:absolute;right:60px;bottom:-40px;width:160px;height:160px;border-radius:50%;background:rgba(23,232,143,.04)}
.ah-tag{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--cbre-accent);margin-bottom:12px}
.ah-title{font-size:36px;font-weight:800;color:#fff;font-family:Georgia,serif;line-height:1.15;margin-bottom:12px}
.ah-desc{font-size:14px;color:rgba(255,255,255,.65);line-height:1.7;max-width:580px;margin-bottom:36px}
.ah-stats{display:flex;gap:40px;flex-wrap:wrap}
.ah-stat .big{font-size:44px;font-weight:800;color:var(--cbre-accent);line-height:1;font-family:Georgia,serif}
.ah-stat .unit{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.about-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:24px}
.about-card h3{font-size:11px;font-weight:700;color:var(--cbre-accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.about-card ul{list-style:none}
.about-card ul li{padding:7px 0;border-bottom:1px solid rgba(23,232,143,.07);color:#c8e8df;font-size:13px;line-height:1.5;display:flex;gap:10px}
.about-card ul li:last-child{border-bottom:none}
.about-card ul li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--cbre-accent);flex-shrink:0;margin-top:6px}
.about-section{margin-bottom:32px}
.about-section h2{font-size:14px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);font-family:Georgia,serif}
.tl-wrap{position:relative;padding-left:28px}
.tl-wrap::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border2)}
.tl-item{position:relative;margin-bottom:28px}
.tl-dot{position:absolute;left:-23px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--border);border:2px solid var(--bg2)}
.tl-dot.active{background:var(--cbre-accent);border-color:var(--cbre-green);box-shadow:0 0 0 4px rgba(23,232,143,.15)}
.tl-phase{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--cbre-accent);margin-bottom:3px}
.tl-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.tl-desc{font-size:13px;color:var(--muted);line-height:1.55}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.pillar{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--cbre-accent);border-radius:0 4px 4px 0;padding:14px 18px}
.pillar-num{font-size:10px;font-weight:700;color:var(--cbre-accent);letter-spacing:.8px;margin-bottom:4px}
.pillar-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
.pillar-desc{font-size:12px;color:var(--muted);line-height:1.5}
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.avatar{width:42px;height:42px;border-radius:2px;background:var(--cbre-green);border:1px solid var(--cbre-accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--cbre-accent);flex-shrink:0;font-family:Georgia,serif}
.team-name{font-size:13px;font-weight:700;color:#fff}
.team-role{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.quote-block{background:var(--cbre-green);border-left:4px solid var(--cbre-accent);border-radius:0 4px 4px 0;padding:24px 28px;margin-top:24px}
.quote-block p{font-size:15px;color:rgba(255,255,255,.85);line-height:1.75;font-style:italic;font-family:Georgia,serif}
.quote-block .attr{font-size:11px;color:var(--cbre-accent);margin-top:10px;font-style:normal;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
 
@media(max-width:640px){
  .charts-grid,.about-grid,.ah-stats{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .dash-hero{flex-direction:column;gap:20px}
  .hero-kpis{margin-left:0}
  header{padding:0 16px}
  .view{padding:16px}
}
</style>
</head>
<body>
 
<header>
  <div class="header-brand">
    <div class="logo">CBRE</div>
    <div class="logo-sub">ONE FM · ENGIE</div>
  </div>
  <div class="header-meta">
    <strong>Action Tracking Dashboard</strong>
    <span>CBRE × ENGIE Partnership Program · 180 Days</span>
  </div>
  <div class="hright">
    <span class="sync-badge warn" id="syncBadge">Loading…</span>
    <button class="btn-sync" id="syncBtn" onclick="triggerSmartsheetSync()" title="Pull latest data from Smartsheet">⟳ Sync Smartsheet</button>
    <nav>
      <button class="tab-btn active" id="tab-btn-dashboard" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="tab-btn" id="tab-btn-actions" onclick="switchTab('actions')">Actions</button>
      <button class="tab-btn" id="tab-btn-about" onclick="switchTab('about')">About</button>
    </nav>
  </div>
</header>
 
<div id="tab-dashboard" class="view active"><div class="loading-screen"><div class="big-spin"></div><span>Loading…</span></div></div>
<div id="tab-actions" class="view"><div class="loading-screen"><div class="big-spin"></div><span>Loading…</span></div></div>
<div id="tab-about" class="view"></div>
 
<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Edit Action</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveRecord()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
 
<script>
const STORAGE_KEY='engie_actions_v6';
const TOPICS=['Account team','H&S','Legal','Management','Operations','Quality','Run stabilization','Sustainibility','User experience'];
const LEADS=['CBRE','ENGIE','Both'];
const STATUSES=['In Progress','Closed','Not Started'];
 
 
 
let records=[],editingId=null,charts={},filters={q:'',status:'',country:'',priority:''};
 
// ── Storage (localStorage) ───────────────────────────────────────────
function storageSave(data){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}
  catch(e){console.warn('localStorage save failed:',e);}
}
function storageLoad(){
  try{const v=localStorage.getItem(STORAGE_KEY);return v?JSON.parse(v):null;}
  catch{return null;}
}
 
async function loadData(){
  setSyncBadge('Loading…','warn');
  renderAbout();
  // 1. Try persisted local edits first
  const saved=storageLoad();
  if(saved&&saved.length){
    records=saved;
    render();
    setSyncBadge('Loaded ✓','ok');
    return;
  }
  // 2. Load from actions.json (Smartsheet sync output)
  try{
    const resp=await fetch('actions.json?t='+Date.now());
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    const now=new Date();
    records=data.map((r,i)=>({
      ...r,
      id: r.id ?? (i+1),
      comments: r.comments ?? [],
      createdAt: r.createdAt || now.toLocaleString(),
      updatedAt: r.updatedAt || r.lastUpdate || now.toLocaleDateString(),
    }));
    persist();
    render();
    setSyncBadge('Synced ✓','ok');
  }catch(e){
    records=[];
    render();
    setSyncBadge('No data — sync needed','warn');
    showToast('Click ⟳ Sync Smartsheet to load data.','warn');
  }
}
function persist(){
  storageSave(records);
  setSyncBadge('Saved ✓','ok');
}
function render(){renderDashboard();renderTable();}
 
// ── Helpers ──────────────────────────────────────────────────────────
function setSyncBadge(t,c){const b=document.getElementById('syncBadge');b.textContent=t;b.className='sync-badge '+c;}
function showToast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3500);}
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-btn-'+t).classList.add('active');
  document.querySelectorAll('.view').forEach(v=>{v.classList.remove('active');v.style.display='none';});
  const el=document.getElementById('tab-'+t);el.style.display='block';el.classList.add('active');
}
function isOverdue(r){
  if(r.status==='Closed') return false;
  const d=r.revisedTargetDate||r.targetDate;
  if(!d) return false;
  try{return new Date(d)<new Date();}catch{return false;}
}
function sBadge(s){
  if(s==='Closed') return '<span class="badge b-closed">Closed</span>';
  if(s==='Not Started') return '<span class="badge b-notstart">Not Started</span>';
  return '<span class="badge b-inprog">In Progress</span>';
}
function pBadge(p){
  if(p==1) return '<span class="badge b-p1">P1</span>';
  if(p==2) return '<span class="badge b-p2">P2</span>';
  if(p==3) return '<span class="badge b-p3">P3</span>';
  return '<span class="badge" style="background:rgba(255,255,255,.05);color:var(--muted)">–</span>';
}
function fmtDate(d){
  if(!d) return '–';
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)){const[y,m,dy]=d.split('-');return dy+'/'+m+'/'+y;}
  return d;
}
function maxId(){return records.length?Math.max(...records.map(r=>r.id)):0;}

// ── Table ─────────────────────────────────────────────────────────────
function renderTable(){
  const countries=[...new Set(records.map(r=>r.country))].sort();
  const filtered=records.filter(r=>{
    if(filters.status&&r.status!==filters.status)return false;
    if(filters.country&&r.country!==filters.country)return false;
    if(filters.priority&&String(r.priority)!==filters.priority)return false;
    if(filters.q&&!JSON.stringify(r).toLowerCase().includes(filters.q.toLowerCase()))return false;
    return true;
  });
  document.getElementById('tab-actions').innerHTML=`
    <div class="table-toolbar">
      <input type="text" id="tSearch" placeholder="Search actions…" value="${filters.q.replace(/"/g,'&quot;')}"/>
      <select id="tStatus"><option value="">All statuses</option>${STATUSES.map(s=>`<option ${filters.status===s?'selected':''}>${s}</option>`).join('')}</select>
      <select id="tCountry"><option value="">All countries</option>${countries.map(c=>`<option ${filters.country===c?'selected':''}>${c}</option>`).join('')}</select>
      <select id="tPriority"><option value="">All priorities</option><option value="1" ${filters.priority==='1'?'selected':''}>P1 – Critical</option><option value="2" ${filters.priority==='2'?'selected':''}>P2 – High</option><option value="3" ${filters.priority==='3'?'selected':''}>P3 – Medium</option></select>
      <button class="btn-add" onclick="openModal(null)">+ New Action</button>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>#</th><th>Country</th><th>Topic</th><th>Pri.</th>
        <th style="min-width:220px">Action Required</th>
        <th>Target Date</th><th>Revised Date</th>
        <th>Owner CBRE</th><th>Owner Engie</th><th>Lead</th>
        <th>Status</th><th>Blocking</th><th>Last Update</th><th>Created</th><th>Created By</th><th></th>
      </tr></thead>
      <tbody>${filtered.map(r=>{const od=isOverdue(r);return`<tr class="${od?'tr-overdue':''}">
        <td style="color:var(--muted);font-size:11px">${r.id}${od?' <span class="b-overdue badge">!</span>':''}</td>
        <td style="white-space:nowrap;font-size:12px">${r.country}</td>
        <td style="white-space:nowrap;font-size:12px">${r.topic}</td>
        <td>${pBadge(r.priority)}</td>
        <td style="max-width:260px;font-size:12px;line-height:1.4">${r.action}</td>
        <td style="white-space:nowrap;font-size:12px">${fmtDate(r.targetDate)}</td>
        <td style="white-space:nowrap;font-size:12px;color:${r.revisedTargetDate?'var(--cbre-wheat)':'var(--muted)'}">${r.revisedTargetDate?fmtDate(r.revisedTargetDate):'–'}</td>
        <td style="white-space:nowrap;font-size:12px">${r.ownerCBRE||'–'}</td>

        <td>${sBadge(r.status)}</td>
        <td>${r.blocking==='YES'?'<span class="badge b-block">YES</span>':'–'}</td>
        <td style="white-space:nowrap;font-size:11px;color:var(--muted)">${r.updatedAt||'–'}</td>
        <td style="white-space:nowrap;font-size:11px;color:var(--muted)">${r.createdAt||'–'}</td>
        <td style="font-size:11px;color:var(--cbre-sage);white-space:nowrap">${r.createdBy||'–'}</td>
        <td><button class="btn-edit" onclick="openModal(${r.id})">Edit</button></td>
      </tr>`;}).join('')}
      </tbody>
    </table></div>`;
  document.getElementById('tSearch').addEventListener('input',e=>{filters.q=e.target.value;renderTable();});
  document.getElementById('tStatus').addEventListener('change',e=>{filters.status=e.target.value;renderTable();});
  document.getElementById('tCountry').addEventListener('change',e=>{filters.country=e.target.value;renderTable();});
  document.getElementById('tPriority').addEventListener('change',e=>{filters.priority=e.target.value;renderTable();});
}

// ── Modal ─────────────────────────────────────────────────────────────

  const body=document.getElementById('modalBody');

        <div class="form-group"><label>Country *</label>
          <select id="f-country"><option value="">Select…</option>${countries.map(c=>`<option>${c}</option>`).join('')}<option value="__new__">+ Other country…</option></select>

        </div>
        <div class="form-group"><label>Topic *</label>

        <div class="form-group"><label>Target due date</label><input id="f-target" type="date"/></div>
      </div>

  } else {
    const prev=r.comments.filter(c=>c.text).length
      ?r.comments.filter(c=>c.text).map(c=>`<div class="comment-entry"><div class="comment-meta">${c.ts}${c.by?' · '+c.by:''}</div>${c.text}</div>`).join('')
      :'<span style="color:var(--muted);font-size:12px">No comments yet</span>';
    body.innerHTML=`
      <div class="sec">Read-only fields</div>
      <div class="form-row">
        <div class="form-group"><label>Country</label><div class="ro-field">${r.country}</div></div>
        <div class="form-group"><label>Topic</label><div class="ro-field">${r.topic}</div></div>
      </div>
      <div class="form-group"><label>Action required</label>
        <div class="ro-field" style="max-height:80px;overflow-y:auto;font-size:12px;white-space:pre-wrap;line-height:1.5">${r.action}</div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Original target date <span style="color:var(--cbre-sage);font-size:9px;text-transform:none;letter-spacing:0">(locked)</span></label>
          <div class="ro-field" style="color:var(--cbre-accent)">${fmtDate(r.targetDate)}</div>
        </div>
        <div class="form-group"><label>Revised target date</label><input id="f-revised" type="date" value="${r.revisedTargetDate||''}"/></div>
      </div>
      <div class="sec">Editable fields</div>
      <div class="form-row">
        <div class="form-group"><label>Status</label><select id="f-status">${STATUSES.map(s=>`<option ${r.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="form-group"><label>Priority</label>
          <select id="f-priority"><option value="0" ${!r.priority?'selected':''}>–</option><option value="1" ${r.priority==1?'selected':''}>P1 – Critical</option><option value="2" ${r.priority==2?'selected':''}>P2 – High</option><option value="3" ${r.priority==3?'selected':''}>P3 – Medium</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Owner CBRE</label><input id="f-ownerCBRE" type="text" value="${r.ownerCBRE||''}"/></div>
        <div class="form-group"><label>Owner Engie</label><input id="f-ownerEngie" type="text" value="${r.ownerEngie||''}"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Lead</label><select id="f-lead"><option value="">–</option>${LEADS.map(l=>`<option ${r.lead===l?'selected':''}>${l}</option>`).join('')}</select></div>
        <div class="form-group"><label>Blocking point</label><select id="f-blocking"><option value="" ${r.blocking!=='YES'?'selected':''}>No</option><option value="YES" ${r.blocking==='YES'?'selected':''}>YES</option></select></div>
      </div>
      <div class="sec">Comments <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;color:var(--muted)">(append-only)</span></div>
      <div class="prev-comments">${prev}</div>
      <div class="form-group"><label>Add new comment</label><textarea id="f-comment" rows="3" placeholder="Type a comment…"></textarea></div>
      <div class="form-group" style="max-width:50%"><label>Your name *</label><input id="f-commenter" type="text" placeholder="Full name"/></div>
      <div style="font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        Created: <strong style="color:var(--text)">${r.createdAt||'–'}</strong> by <strong style="color:var(--text)">${r.createdBy||'–'}</strong>
        &nbsp;·&nbsp; Last updated: <strong style="color:var(--text)">${r.updatedAt||'–'}</strong>
      </div>`;
  }
  document.getElementById('modal').classList.add('open');
}
 
function closeModal(){document.getElementById('modal').classList.remove('open');editingId=null;}
 
async function saveRecord(){
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Saving…';
  const ts=new Date().toLocaleString();
  try{
    if(!editingId){
      let country=document.getElementById('f-country').value;
      if(country==='__new__') country=(document.getElementById('f-country-new').value||'').trim();
      const action=(document.getElementById('f-action').value||'').trim();
      const by=(document.getElementById('f-createdby').value||'').trim();
      const topic=document.getElementById('f-topic').value;
      if(!country){showToast('Please select or enter a country.','err');return;}
      if(!topic){showToast('Please select a topic.','err');return;}
      if(!action){showToast('Action required field cannot be empty.','err');return;}
      if(!by){showToast('Please enter your name.','err');return;}
      records.push({id:maxId()+1,country,topic,priority:parseInt(document.getElementById('f-priority').value)||0,
        source:'Dashboard',raised:new Date().toLocaleDateString(),action,
        targetDate:document.getElementById('f-target').value||'',revisedTargetDate:'',
        ownerCBRE:document.getElementById('f-ownerCBRE').value.trim(),
        ownerEngie:document.getElementById('f-ownerEngie').value.trim(),
        lead:document.getElementById('f-lead').value,status:document.getElementById('f-status').value,
        blocking:document.getElementById('f-blocking').value,
        comments:[],createdAt:ts,createdBy:by,updatedAt:ts,lastUpdate:ts});
    } else {
      const r=records.find(x=>x.id===editingId);
      const commenter=(document.getElementById('f-commenter').value||'').trim();
      const comment=(document.getElementById('f-comment').value||'').trim();
      if(comment&&!commenter){showToast('Please enter your name to add a comment.','err');return;}
      r.status=document.getElementById('f-status').value;
      r.priority=parseInt(document.getElementById('f-priority').value)||0;
      r.ownerCBRE=document.getElementById('f-ownerCBRE').value.trim();
      r.ownerEngie=document.getElementById('f-ownerEngie').value.trim();
      r.lead=document.getElementById('f-lead').value;
      r.blocking=document.getElementById('f-blocking').value;
      const rev=document.getElementById('f-revised').value;
      if(rev) r.revisedTargetDate=rev;
      if(comment) r.comments.push({ts:new Date().toLocaleString(),by:commenter,text:comment});
      r.updatedAt=ts;r.lastUpdate=ts;
    }
    persist();
    closeModal();
    showToast('Saved successfully ✓','ok');
    render();
  } finally{btn.disabled=false;btn.textContent='Save';}
}
 
// ── Smartsheet Sync (triggers GitHub Actions workflow) ───────────────
const GH_REPO     = 'cbre-vantage-studio/engie';
const GH_WORKFLOW = 'sync.yml';
const GH_PAT      = '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';
 
async function triggerSmartsheetSync(){
  const btn=document.getElementById('syncBtn');
  btn.disabled=true;
  btn.textContent='⟳ Triggering…';
  setSyncBadge('Triggering sync…','warn');
  try{
    const res=await fetch(
      `https://api.github.com/repos/${GH_REPO}/actions/workflows/${GH_WORKFLOW}/dispatches`,
      {
        method:'POST',
        headers:{
          'Authorization':`token ${GH_PAT}`,
          'Accept':'application/vnd.github.v3+json',
          'Content-Type':'application/json',
          'X-GitHub-Api-Version':'2022-11-28',
        },
        body:JSON.stringify({ref:'main'}),
      }
    );
    if(res.status===204){
      setSyncBadge('Sync running…','warn');
      showToast('Smartsheet sync started — dashboard will refresh in ~35 seconds.','ok');
      btn.textContent='⟳ Syncing…';
      setTimeout(async()=>{
        try{
          const r=await fetch('actions.json?t='+Date.now());
          if(!r.ok) throw new Error('actions.json not ready yet');
          const data=await r.json();
          const now=new Date();
          const fresh=data.map((row,i)=>({
            ...row,
            id:row.id??(i+1),
            comments:row.comments??[],
            createdAt:row.createdAt||now.toLocaleString(),
            updatedAt:row.updatedAt||row.lastUpdate||now.toLocaleDateString(),
          }));
          // Preserve local comments
          try{
            const prev=storageLoad();
            if(prev){
              const prevMap=Object.fromEntries(prev.map(r=>[r.id,r]));
              fresh.forEach(r=>{if(prevMap[r.id])r.comments=prevMap[r.id].comments;});
            }
          }catch{}
          records=fresh;
          persist();
          render();
          setSyncBadge('Synced ✓','ok');
          showToast('Dashboard updated with latest Smartsheet data ✓','ok');
        }catch(e){
          setSyncBadge('Synced — refresh page','ok');
          showToast('Sync done — reload the page to see latest data.','ok');
        }
        btn.disabled=false;
        btn.textContent='⟳ Sync Smartsheet';
      },35000);
    } else {
      let detail='';
      try{const j=await res.json();detail=j.message||'';}catch{}
      setSyncBadge('Trigger failed','err');
      showToast(`GitHub API ${res.status}${detail?' – '+detail:''}. Check PAT permissions.`,'err');
      btn.disabled=false;
      btn.textContent='⟳ Sync Smartsheet';
    }
  }catch(e){
    setSyncBadge('Network error','err');
    showToast('Could not reach GitHub API: '+e.message,'err');
    btn.disabled=false;
    btn.textContent='⟳ Sync Smartsheet';
  }
}
